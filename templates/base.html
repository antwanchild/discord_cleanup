<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Discord Cleanup Bot{% endblock %} — v{{ version }}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.slate.min.css">
  <style>
    :root {
      --brand:        #7b4fd4;
      --brand-soft:   #5a3a99;
      --brand-glow:   rgba(123, 79, 212, 0.15);
      --surface:      #1a1a2e;
      --surface-alt:  #16213e;
      --border:       rgba(123, 79, 212, 0.25);
      --text-muted:   #8888aa;
      --success:      #2ecc71;
      --warning:      #f39c12;
      --danger:       #e74c3c;
      --font-mono:    "JetBrains Mono", "Fira Code", "Cascadia Code", monospace;
    }

    /* ── Layout ── */
    body {
      background: var(--surface);
      min-height: 100vh;
    }

    nav.topbar {
      background: var(--surface-alt);
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 2rem;
      display: flex;
      align-items: center;
      gap: 2rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .topbar-brand {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      text-decoration: none;
      color: var(--brand);
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }

    .topbar-brand .logo {
      width: 22px;
      height: 22px;
      fill: var(--brand);
    }

    .topbar-nav {
      display: flex;
      gap: 0.25rem;
      flex: 1;
    }

    .topbar-nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.875rem;
      padding: 0.4rem 0.75rem;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
    }

    .topbar-nav a:hover {
      color: #fff;
      background: var(--brand-glow);
    }

    .topbar-nav a.active {
      color: var(--brand);
      background: var(--brand-glow);
    }

    .topbar-version {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--text-muted);
      white-space: nowrap;
    }

    /* ── Main content ── */
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
    }

    /* ── Cards ── */
    .card {
      background: var(--surface-alt);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--border);
    }

    .card-title {
      font-size: 0.875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin: 0;
    }

    /* ── Stats grid ── */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 1rem;
    }

    .stat-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
      text-align: center;
    }

    .stat-value {
      font-family: var(--font-mono);
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--brand);
      line-height: 1;
      margin-bottom: 0.25rem;
    }

    .stat-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* ── Status pills ── */
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.75rem;
      font-family: var(--font-mono);
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      font-weight: 500;
    }

    .pill-success { background: rgba(46, 204, 113, 0.15); color: var(--success); }
    .pill-warning { background: rgba(243, 156, 18, 0.15); color: var(--warning); }
    .pill-danger  { background: rgba(231, 76, 60, 0.15);  color: var(--danger); }
    .pill-brand   { background: var(--brand-glow); color: var(--brand); }

    .pill::before {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }

    /* ── Form elements ── */
    .form-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }

    .form-row label {
      min-width: 160px;
      font-size: 0.875rem;
      color: var(--text-muted);
      margin: 0;
    }

    .form-row select,
    .form-row input {
      flex: 1;
      min-width: 120px;
      margin: 0;
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.8rem;
      padding: 0.4rem 1rem;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-weight: 500;
      transition: opacity 0.15s;
      text-decoration: none;
    }

    .btn:hover { opacity: 0.85; }
    .btn-primary { background: var(--brand); color: #fff; }
    .btn-danger  { background: var(--danger); color: #fff; }
    .btn-ghost   { background: var(--brand-glow); color: var(--brand); border: 1px solid var(--border); }

    /* ── Toast notifications ── */
    #toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      padding: 0.75rem 1.25rem;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.25s;
      z-index: 999;
      pointer-events: none;
    }

    #toast.show { opacity: 1; }
    #toast.success { background: rgba(46, 204, 113, 0.9); color: #fff; }
    #toast.error   { background: rgba(231, 76, 60, 0.9);  color: #fff; }

    /* ── Mono text ── */
    .mono { font-family: var(--font-mono); font-size: 0.85em; }

    /* ── Page header ── */
    .page-header {
      margin-bottom: 2rem;
    }

    .page-header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin: 0 0 0.25rem;
    }

    .page-header p {
      color: var(--text-muted);
      font-size: 0.875rem;
      margin: 0;
    }

    /* ── Table ── */
    table {
      font-size: 0.875rem;
    }

    thead th {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
    }
  </style>
</head>
<body>

  <!-- Top navigation bar -->
  <nav class="topbar">
    <a href="/" class="topbar-brand">
      <svg class="logo" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057.1 18.08.11 18.1.128 18.11a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/>
      </svg>
      Discord Cleanup
    </a>
    <div class="topbar-nav">
      <a href="/"        class="{% if request.path == '/' %}active{% endif %}">Dashboard</a>
      <a href="/config"  class="{% if request.path == '/config' %}active{% endif %}">Config</a>
      <a href="/schedule"class="{% if request.path == '/schedule' %}active{% endif %}">Schedule</a>
      <a href="/stats"   class="{% if request.path == '/stats' %}active{% endif %}">Stats</a>
      <a href="/logs"    class="{% if '/logs' in request.path %}active{% endif %}">Logs</a>
    </div>
    <span class="topbar-version">v{{ version }}</span>
  </nav>

  <main>
    {% block content %}{% endblock %}
  </main>

  <!-- Toast notification -->
  <div id="toast"></div>

  <script>
    function showToast(message, type = "success") {
      const toast = document.getElementById("toast");
      toast.textContent = message;
      toast.className = `show ${type}`;
      setTimeout(() => { toast.className = ""; }, 3000);
    }

    async function postForm(url, formData) {
      const resp = await fetch(url, { method: "POST", body: formData });
      const data = await resp.json();
      showToast(data.message, data.success ? "success" : "error");
      return data;
    }
  </script>

  {% block scripts %}{% endblock %}
</body>
</html>

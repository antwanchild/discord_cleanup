{% extends "base.html" %}

{% block title %}Config{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Configuration</h1>
  <p>Changes apply immediately in memory and persist to .env.discord_cleanup</p>
</div>

<!-- Bot settings -->
<div class="card">
  <div class="card-header">
    <span class="card-title">Bot Settings</span>
  </div>

  <div class="form-row">
    <label>Default Retention</label>
    <input type="number" id="retention-input" value="{{ default_retention }}" min="1" max="365" style="max-width:100px">
    <span style="color:var(--text-muted); font-size:0.8rem">days (1–365)</span>
    <button class="btn btn-primary" onclick="saveRetention()">Save</button>
  </div>

  <div class="form-row">
    <label>Log Level</label>
    <select id="loglevel-select">
      {% for level in ["DEBUG", "INFO", "WARNING", "ERROR"] %}
        <option value="{{ level }}" {% if log_level == level %}selected{% endif %}>{{ level }}</option>
      {% endfor %}
    </select>
    <button class="btn btn-primary" onclick="saveLogLevel()">Save</button>
  </div>

  <div class="form-row">
    <label>Warn Unconfigured</label>
    <select id="warn-select">
      <option value="true"  {% if warn_unconfigured %}selected{% endif %}>Enabled</option>
      <option value="false" {% if not warn_unconfigured %}selected{% endif %}>Disabled</option>
    </select>
    <button class="btn btn-primary" onclick="saveWarnUnconfigured()">Save</button>
  </div>

  <div class="form-row">
    <label>Report Frequency</label>
    <select id="freq-select">
      {% for freq in ["monthly", "weekly", "both"] %}
        <option value="{{ freq }}" {% if report_frequency == freq %}selected{% endif %}>{{ freq | capitalize }}</option>
      {% endfor %}
    </select>
    <button class="btn btn-primary" onclick="saveReportFrequency()">Save</button>
  </div>
</div>

<!-- channels.yml editor -->
<div class="card">
  <div class="card-header">
    <span class="card-title">channels.yml</span>
    <span style="color:var(--text-muted); font-size:0.75rem; margin-left:0.5rem">Reloads immediately on save</span>
    <button class="btn btn-primary" onclick="saveChannels()" style="margin-left:auto">Save & Reload</button>
  </div>
  <textarea id="channels-editor" rows="24" style="
    width: 100%;
    font-family: var(--font-mono);
    font-size: 0.8rem;
    background: var(--surface);
    color: #e0e0f0;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 1rem;
    resize: vertical;
    line-height: 1.6;
  ">{{ channels_yml }}</textarea>
</div>
{% endblock %}

{% block scripts %}
<script>
  async function saveRetention() {
    const fd = new FormData();
    fd.append("days", document.getElementById("retention-input").value);
    await postForm("/config/retention", fd);
  }

  async function saveLogLevel() {
    const fd = new FormData();
    fd.append("level", document.getElementById("loglevel-select").value);
    await postForm("/config/loglevel", fd);
  }

  async function saveWarnUnconfigured() {
    const fd = new FormData();
    fd.append("enabled", document.getElementById("warn-select").value);
    await postForm("/config/warnunconfigured", fd);
  }

  async function saveReportFrequency() {
    const fd = new FormData();
    fd.append("frequency", document.getElementById("freq-select").value);
    await postForm("/config/reportfrequency", fd);
  }

  async function saveChannels() {
    const fd = new FormData();
    fd.append("channels_yml", document.getElementById("channels-editor").value);
    await postForm("/config/channels", fd);
  }
</script>
{% endblock %}

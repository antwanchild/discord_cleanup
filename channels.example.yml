channels:
  # --- CATEGORIES ---
  # Bot will automatically clean all text channels under this category
  # using the default retention from DEFAULT_RETENTION in .env
  - id: 234567890123456789
    name: Radarr
    type: category

  # Category with a retention override — overrides DEFAULT_RETENTION
  - id: 345678901234567890
    name: Sonarr
    type: category
    days: 4

  # --- SUB CHANNEL OVERRIDES ---
  # Override retention for a specific channel inside a category
  - id: 123456789012345678
    name: radarr-movies
    days: 3
    notification_group: Arr Build Channels

  # --- EXCLUSIONS ---
  # Exclude a specific channel from cleanup entirely
  # Silently skipped in notification, logged in log file
  # Also cannot be targeted by single-channel cleanup runs
  - id: 789012345678901234
    name: radarr-important
    exclude: true

  # --- STANDALONE CHANNELS ---
  # Individual channel not part of a configured category
  # Uses DEFAULT_RETENTION from .env
  - id: 567890123456789012
    name: crowdsec
    # Optional: group channels together in monthly/weekly Discord reports
    # notification_group: Build Channels

  # Individual channel with retention override and deep clean enabled
  - id: 678901234567890123
    name: notifications
    days: 14
    deep_clean: true

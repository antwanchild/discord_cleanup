name: CI

on:
  pull_request:
  push:
    branches-ignore:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  actionlint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Lint workflow
        uses: raven-actions/actionlint@v2

  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Syntax check
        run: |
          python3 -m py_compile cleanup_bot.py config.py stats.py utils.py \
            notifications.py cleanup.py commands.py commands_stats.py web.py api.py \
            config_utils.py scheduler.py
          echo "✅ Syntax check passed"

      - name: Install test dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt pytest

      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: pytest -q

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Lint and security check
        continue-on-error: true
        run: |
          pip install ruff --quiet
          ruff check --select F,S \
            cleanup_bot.py config.py stats.py utils.py \
            notifications.py cleanup.py commands.py commands_stats.py web.py api.py \
            config_utils.py scheduler.py \
            || echo "⚠️ Warnings found — build continues"

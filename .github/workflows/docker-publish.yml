name: Build and Push to GHCR

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'SETUP.md'
      - '.github/dependabot.yml'
      - '.gitignore'
      - '.dockerignore'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Full history needed for changelog generation

      # ── Security scanning ───────────────────────────────────────────────────
      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      # ── Code quality ────────────────────────────────────────────────────────
      - name: Lint workflow
        uses: raven-actions/actionlint@v2
        continue-on-error: true

      - name: Syntax check
        run: |
          python3 -m py_compile cleanup_bot.py config.py stats.py utils.py \
            notifications.py cleanup.py commands.py commands_stats.py web.py
          echo "✅ Syntax check passed"

      - name: Lint and security check
        continue-on-error: true
        run: |
          pip install ruff --quiet
          ruff check --select F,S \
            cleanup_bot.py config.py stats.py utils.py \
            notifications.py cleanup.py commands.py commands_stats.py web.py \
            || echo "⚠️ Warnings found — build continues"

      # ── Version bump ────────────────────────────────────────────────────────
      - name: Bump version
        id: bump
        run: |
          current_version=$(cat VERSION)
          major=$(echo "$current_version" | cut -d. -f1)
          minor=$(echo "$current_version" | cut -d. -f2)
          patch=$(echo "$current_version" | cut -d. -f3)

          # Read the full commit message to detect bump type tags
          git log --format=%B --no-merges -n 1 > /tmp/commit_body.txt

          if grep -q "#major" /tmp/commit_body.txt; then
            new_version="$((major + 1)).0.0"
            bump_type="major"
          elif grep -q "#minor" /tmp/commit_body.txt; then
            new_version="$major.$((minor + 1)).0"
            bump_type="minor"
          else
            new_version="$major.$minor.$((patch + 1))"
            bump_type="patch"
          fi

          echo "$new_version" > VERSION

          # Strip bump type tags from commit message for release notes
          commit_msg=$(tr '\n' ' ' < /tmp/commit_body.txt | sed 's/#//g')
          echo "$commit_msg" > commit_msg.txt

          {
            echo "version=$new_version"
            echo "bump_type=$bump_type"
            echo "commit_msg=$commit_msg"
          } >> "$GITHUB_OUTPUT"

      - name: Upload commit message artifact
        uses: actions/upload-artifact@v7
        with:
          name: commit-msg
          path: commit_msg.txt
          retention-days: 1        

      - name: Commit bumped version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "Auto bump version to ${{ steps.bump.outputs.version }}"
          git push

      # ── Changelog ───────────────────────────────────────────────────────────
      - name: Generate changelog
        env:
          CURRENT_VERSION: ${{ steps.bump.outputs.version }}
        run: |
          current_version="${CURRENT_VERSION}"
          last_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          # Collect commits since the last release tag (or last 100 if no tag)
          if [ -n "$last_tag" ]; then
            git log "${last_tag}..HEAD~1" --format="%H %s" --no-merges > commits.txt
          else
            git log "HEAD~1" --format="%H %s" --no-merges -n 100 > commits.txt
          fi

          true > changelog.tmp

          # Walk each auto-bump commit and pair it with the commit that preceded it
          while IFS= read -r line; do
            commit_sha=$(echo "$line" | cut -d' ' -f1)
            commit_msg=$(echo "$line" | cut -d' ' -f2-)
            if echo "$commit_msg" | grep -q "^Auto bump version to "; then
              bumped_version="${commit_msg#Auto bump version to }"
              prev_msg=$(git log -1 --format="%s" "${commit_sha}~1")
              echo "${bumped_version}|${prev_msg}" >> changelog.tmp
            fi
          done < commits.txt

          # The triggering commit hasn't been auto-bumped yet — add it manually
          trigger_msg=$(git log -1 --format="%s" HEAD~1 | sed 's/#[^ ]*//g' | sed 's/^[[:space:]]*//' | sed 's/[[:space:]]*$//')
          echo "${current_version}|${trigger_msg}" > changelog.current
          cat changelog.tmp >> changelog.current 2>/dev/null || true
          mv changelog.current changelog.tmp

          # Write newest-first for display
          if [ -s changelog.tmp ]; then
            tac changelog.tmp > CHANGELOG
          else
            echo "${current_version}|No changes recorded" > CHANGELOG
          fi
          rm -f changelog.tmp commits.txt

          echo "Changelog:"
          cat CHANGELOG

      # ── Docker build ────────────────────────────────────────────────────────
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/discord_cleanup
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ steps.bump.outputs.version }}
          labels: |
            org.opencontainers.image.version=${{ steps.bump.outputs.version }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.bump.outputs.version }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
            SOURCE_URL=https://github.com/${{ github.repository }}

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/discord_cleanup:${{ steps.bump.outputs.version }}
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

      # ── GitHub Release ───────────────────────────────────────────────────────
      - name: Create GitHub Release
        if: steps.bump.outputs.bump_type != 'patch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.version }}
          name: v${{ steps.bump.outputs.version }}
          body: ${{ steps.bump.outputs.commit_msg }}
          generate_release_notes: true

      - name: Delete old GitHub Releases
        if: steps.bump.outputs.bump_type != 'patch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Keep only the 10 most recent releases
          releases=$(gh release list --limit 100 --json tagName --jq '.[].tagName')
          count=0
          for tag in $releases; do
            count=$((count + 1))
            if [ "$count" -gt 10 ]; then
              echo "Deleting old release: $tag"
              gh release delete "$tag" --yes --cleanup-tag
            fi
          done

      # ── Cleanup old images ───────────────────────────────────────────────────
      - name: Delete old GHCR images
        uses: actions/delete-package-versions@v5
        with:
          package-name: discord_cleanup
          package-type: container
          min-versions-to-keep: 10
          delete-only-untagged-versions: true

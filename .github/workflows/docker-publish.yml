name: Build and Push to GHCR

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Bump version
        id: bump
        run: |
          VERSION=$(cat VERSION)
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)

          COMMIT_MSG=$(git log --format=%B --no-merges -n 1)

          if echo "$COMMIT_MSG" | grep -q "#major"; then
            NEW_VERSION="$((MAJOR + 1)).0.0"
          elif echo "$COMMIT_MSG" | grep -q "#minor"; then
            NEW_VERSION="$MAJOR.$((MINOR + 1)).0"
          else
            NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
          fi

          echo $NEW_VERSION > VERSION
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          # Save original commit message for release notes
          echo "commit_msg=$COMMIT_MSG" >> $GITHUB_OUTPUT

      - name: Commit bumped version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "Auto bump version to ${{ steps.bump.outputs.version }}"
          git push

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/discord_cleanup:latest
            ghcr.io/${{ github.repository_owner }}/discord_cleanup:${{ steps.bump.outputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.version }}
          name: v${{ steps.bump.outputs.version }}
          body: ${{ steps.bump.outputs.commit_msg }}
          generate_release_notes: true

      - name: Delete old GHCR images
        uses: actions/delete-package-versions@v5
        with:
          package-name: discord_cleanup
          package-type: container
          min-versions-to-keep: 10
          delete-untagged-versions: true

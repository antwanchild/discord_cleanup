name: Build and Push to GHCR

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'CHANGELOG.md'
      - 'docs/**'
      - '.github/dependabot.yml'
      - '.gitignore'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Full history needed for changelog generation

      # ── Security scanning ───────────────────────────────────────────────────
      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      # ── Code quality ────────────────────────────────────────────────────────
      - name: Lint workflow
        uses: raven-actions/actionlint@v2

      - name: Syntax check
        run: |
          python3 -m py_compile cleanup_bot.py config.py stats.py utils.py \
            notifications.py cleanup.py commands.py commands_stats.py web.py api.py \
            config_utils.py scheduler.py
          echo "✅ Syntax check passed"

      - name: Install test dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt pytest

      - name: Run tests
        run: pytest -q

      - name: Lint and security check
        continue-on-error: true
        run: |
          pip install ruff --quiet
          ruff check --select F,S \
            cleanup_bot.py config.py stats.py utils.py \
            notifications.py cleanup.py commands.py commands_stats.py web.py api.py \
            config_utils.py scheduler.py \
            || echo "⚠️ Warnings found — build continues"

      # ── Version bump ────────────────────────────────────────────────────────
      - name: Bump version
        id: bump
        run: |
          current_version=$(cat VERSION)
          major=$(echo "$current_version" | cut -d. -f1)
          minor=$(echo "$current_version" | cut -d. -f2)
          patch=$(echo "$current_version" | cut -d. -f3)

          # Read the full commit message to detect bump type tags
          git log --format=%B --no-merges -n 1 > /tmp/commit_body.txt

          if grep -q "#major" /tmp/commit_body.txt; then
            new_version="$((major + 1)).0.0"
            bump_type="major"
          elif grep -q "#minor" /tmp/commit_body.txt; then
            new_version="$major.$((minor + 1)).0"
            bump_type="minor"
          else
            new_version="$major.$minor.$((patch + 1))"
            bump_type="patch"
          fi

          echo "$new_version" > VERSION
          release_title=$(head -n 1 /tmp/commit_body.txt | sed -E 's/(^|[[:space:]])#(major|minor)\b//g' | sed -E 's/[[:space:]]+/ /g' | sed -E 's/^[[:space:]]+|[[:space:]]+$//g')
          if [ -z "$release_title" ]; then
            release_title="Release ${new_version}"
          fi

          echo "$release_title" > release_title.txt

          {
            echo "version=$new_version"
            echo "bump_type=$bump_type"
            echo "release_title=$release_title"
          } >> "$GITHUB_OUTPUT"

      - name: Upload release title artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-title
          path: release_title.txt
          retention-days: 1

      - name: Update changelog
        env:
          CURRENT_VERSION: ${{ steps.bump.outputs.version }}
        run: |
          current_version="${CURRENT_VERSION}"
          release_date=$(date -u +"%Y-%m-%d")

          cleaned_body_file=$(mktemp)
          sed -E 's/(^|[[:space:]])#(major|minor)\b//g' /tmp/commit_body.txt | sed -E 's/[[:space:]]+$//' > "$cleaned_body_file"

          {
            echo "## ${current_version} - ${release_date}"
            echo
            echo "### Changes"

            found_line=0
            while IFS= read -r line || [ -n "$line" ]; do
              trimmed=$(echo "$line" | sed -E 's/^[[:space:]]+|[[:space:]]+$//g')
              if [ -n "$trimmed" ]; then
                found_line=1
                case "$trimmed" in
                  -\ *|\*\ *)
                    trimmed="${trimmed#??}"
                    ;;
                esac
                echo "- $trimmed"
              fi
            done < "$cleaned_body_file"

            if [ "$found_line" -eq 0 ]; then
              echo "- Release ${current_version}"
            fi

            echo
          } > changelog_entry.md
          rm -f "$cleaned_body_file"

          if [ -f CHANGELOG.md ]; then
            {
              head -n 1 CHANGELOG.md
              echo
              cat changelog_entry.md
              tail -n +2 CHANGELOG.md
            } > CHANGELOG.md.tmp
          else
            {
              echo "# Changelog"
              echo
              cat changelog_entry.md
            } > CHANGELOG.md.tmp
          fi

          mv CHANGELOG.md.tmp CHANGELOG.md

      - name: Commit bumped version and changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add VERSION CHANGELOG.md
          git commit -m "Auto bump version to ${{ steps.bump.outputs.version }} [skip ci]"
          git push

      # ── Docker build ────────────────────────────────────────────────────────
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/discord_cleanup
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ steps.bump.outputs.version }}
          labels: |
            org.opencontainers.image.version=${{ steps.bump.outputs.version }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.bump.outputs.version }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
            SOURCE_URL=https://github.com/${{ github.repository }}

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@v0.36.0
        continue-on-error: true
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/discord_cleanup:${{ steps.bump.outputs.version }}
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

      # ── GitHub Release ───────────────────────────────────────────────────────
      - name: Create GitHub Release
        if: steps.bump.outputs.bump_type != 'patch'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.bump.outputs.version }}
          name: v${{ steps.bump.outputs.version }}
          body: ${{ steps.bump.outputs.release_title }}
          generate_release_notes: true

      - name: Delete old GitHub Releases
        if: steps.bump.outputs.bump_type != 'patch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Keep only the 10 most recent releases
          releases=$(gh release list --limit 100 --json tagName --jq '.[].tagName')
          count=0
          for tag in $releases; do
            count=$((count + 1))
            if [ "$count" -gt 10 ]; then
              echo "Deleting old release: $tag"
              gh release delete "$tag" --yes --cleanup-tag
            fi
          done

      # ── Cleanup old images ───────────────────────────────────────────────────
      - name: Delete old GHCR images
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.repository }}
          PACKAGE_NAME: discord_cleanup
        run: |
          owner_type=$(gh api "repos/${REPO_NAME}" --jq '.owner.type')
          if [ "$owner_type" = "User" ]; then
            owner_path="users/${REPO_OWNER}"
          else
            owner_path="orgs/${REPO_OWNER}"
          fi

          mapfile -t version_ids < <(gh api --paginate "${owner_path}/packages/container/${PACKAGE_NAME}/versions?per_page=100" --jq '.[].id')
          keep=10

          if [ "${#version_ids[@]}" -le "$keep" ]; then
            echo "Keeping ${#version_ids[@]} GHCR versions"
            exit 0
          fi

          for ((i=keep; i<${#version_ids[@]}; i++)); do
            version_id="${version_ids[$i]}"
            echo "Deleting old GHCR version: ${version_id}"
            gh api --method DELETE "${owner_path}/packages/container/${PACKAGE_NAME}/versions/${version_id}"
          done

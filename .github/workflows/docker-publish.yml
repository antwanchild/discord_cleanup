name: Build and Push to GHCR

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - '.github/dependabot.yml'
      - '.gitignore'
      - '.dockerignore'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install code analysis tools
        run: pip install ruff pyflakes bandit

      - name: Syntax check
        run: python -m py_compile cleanup_bot.py

      - name: Lint with ruff
        run: ruff check cleanup_bot.py --fix

      - name: Check with pyflakes
        run: pyflakes cleanup_bot.py

      - name: Security check with bandit
        run: bandit -r cleanup_bot.py

      - name: Bump version
        id: bump
        run: |
          VERSION=$(cat VERSION)
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)

          COMMIT_MSG="${{ github.event.head_commit.message }}"

          if echo "$COMMIT_MSG" | grep -q "#major"; then
            NEW_VERSION="$((MAJOR + 1)).0.0"
          elif echo "$COMMIT_MSG" | grep -q "#minor"; then
            NEW_VERSION="$MAJOR.$((MINOR + 1)).0"
          else
            NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
          fi

          echo $NEW_VERSION > VERSION
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

          # Sanitize commit message for GITHUB_OUTPUT
          SAFE_MSG=$(echo "$COMMIT_MSG" | tr -d '\n\r' | sed 's/#//g')
          echo "commit_msg=$SAFE_MSG" >> $GITHUB_OUTPUT

      - name: Commit bumped version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "Auto bump version to ${{ steps.bump.outputs.version }}"
          git push

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/discord_cleanup:latest
            ghcr.io/${{ github.repository_owner }}/discord_cleanup:${{ steps.bump.outputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.version }}
          name: v${{ steps.bump.outputs.version }}
          body: ${{ steps.bump.outputs.commit_msg }}
          generate_release_notes: true

      - name: Delete old GHCR images
        uses: actions/delete-package-versions@v5
        with:
          package-name: discord_cleanup
          package-type: container
          min-versions-to-keep: 10
          delete-untagged-versions: true


name: Build and Push to GHCR

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'SETUP.md'
      - '.github/dependabot.yml'
      - '.gitignore'
      - '.dockerignore'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Lint workflow
        uses: raven-actions/actionlint@v2

      - name: Syntax check
        run: |
          python3 -m py_compile cleanup_bot.py config.py stats.py utils.py notifications.py cleanup.py commands.py
          echo "✅ Syntax check passed"

      - name: Lint check
        continue-on-error: true
        run: |
          pip install ruff --quiet
          echo "Running ruff lint check..."
          ruff check cleanup_bot.py config.py stats.py utils.py notifications.py cleanup.py commands.py || echo "⚠️ Lint warnings found — build continues"

      - name: Security check
        continue-on-error: true
        run: |
          pip install bandit --quiet
          bandit -r cleanup_bot.py config.py stats.py utils.py notifications.py cleanup.py commands.py --skip B108 || echo "⚠️ Security warnings found — build continues"

      - name: Bump version
        id: bump
        run: |
          VERSION=$(cat VERSION)
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)

          git log --format=%B --no-merges -n 1 > /tmp/raw_msg.txt

          if grep -q "#major" /tmp/raw_msg.txt; then
            NEW_VERSION="$((MAJOR + 1)).0.0"
            BUMP_TYPE="major"
          elif grep -q "#minor" /tmp/raw_msg.txt; then
            NEW_VERSION="$MAJOR.$((MINOR + 1)).0"
            BUMP_TYPE="minor"
          else
            NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
            BUMP_TYPE="patch"
          fi

          echo "$NEW_VERSION" > VERSION
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "bump_type=$BUMP_TYPE" >> "$GITHUB_OUTPUT"
          
      - name: Write commit message to file
        run: tr '\n' ' ' < /tmp/raw_msg.txt | sed 's/#//g' | xargs > commit_msg.txt

      - name: Upload commit message artifact
        uses: actions/upload-artifact@v7
        with:
          name: commit-msg
          path: commit_msg.txt
          retention-days: 1

      - name: Commit bumped version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "Auto bump version to ${{ steps.bump.outputs.version }}"
          git push

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/discord_cleanup
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ steps.bump.outputs.version }}
          labels: |
            org.opencontainers.image.version=${{ steps.bump.outputs.version }}
            
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # Use the outputs from the meta step above
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.bump.outputs.version }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
            SOURCE_URL=https://github.com/${{ github.repository }}

      - name: Create GitHub Release
        if: steps.bump.outputs.bump_type != 'patch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.version }}
          name: v${{ steps.bump.outputs.version }}
          body: ${{ steps.bump.outputs.commit_msg }}
          generate_release_notes: true

      - name: Delete old GHCR images
        uses: actions/delete-package-versions@v5
        with:
          package-name: discord_cleanup
          package-type: container
          min-versions-to-keep: 10
          delete-only-untagged-versions: true

name: Build and Push to GHCR

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'CHANGELOG.md'
      - 'docs/**'
      - '.github/dependabot.yml'
      - '.gitignore'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Prepare release notes
        id: notes
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          release_notes=$(mktemp)
          awk -v version="$VERSION" '
            BEGIN { found = 0 }
            /^## / {
              if (found) {
                exit
              }
              if ($0 ~ "^## " version " - ") {
                found = 1
                next
              }
            }
            found {
              print
            }
          ' CHANGELOG.md > "$release_notes"

          if [ ! -s "$release_notes" ]; then
            {
              echo "## ${VERSION}"
              echo
              echo "Release ${VERSION}"
            } > "$release_notes"
          fi

          echo "release_notes=$release_notes" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/discord_cleanup
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.version }}
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.version }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
            SOURCE_URL=https://github.com/${{ github.repository }}

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@v0.36.0
        continue-on-error: true
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/discord_cleanup:${{ steps.version.outputs.version }}
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body_path: ${{ steps.notes.outputs.release_notes }}
          generate_release_notes: false

      - name: Delete old GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Keep only the 10 most recent releases
          releases=$(gh release list --limit 100 --json tagName --jq '.[].tagName')
          count=0
          for tag in $releases; do
            count=$((count + 1))
            if [ "$count" -gt 10 ]; then
              echo "Deleting old release: $tag"
              gh release delete "$tag" --yes --cleanup-tag
            fi
          done

      # ── Cleanup old images ───────────────────────────────────────────────────
      - name: Delete old GHCR images
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.repository }}
          PACKAGE_NAME: discord_cleanup
        run: |
          owner_type=$(gh api "repos/${REPO_NAME}" --jq '.owner.type')
          if [ "$owner_type" = "User" ]; then
            owner_path="users/${REPO_OWNER}"
          else
            owner_path="orgs/${REPO_OWNER}"
          fi

          mapfile -t version_ids < <(gh api --paginate "${owner_path}/packages/container/${PACKAGE_NAME}/versions?per_page=100" --jq '.[].id')
          keep=10

          if [ "${#version_ids[@]}" -le "$keep" ]; then
            echo "Keeping ${#version_ids[@]} GHCR versions"
            exit 0
          fi

          for ((i=keep; i<${#version_ids[@]}; i++)); do
            version_id="${version_ids[$i]}"
            echo "Deleting old GHCR version: ${version_id}"
            gh api --method DELETE "${owner_path}/packages/container/${PACKAGE_NAME}/versions/${version_id}"
          done

name: Prepare Release PR

on:
  push:
    branches-ignore:
      - main
    paths-ignore:
      - VERSION
      - CHANGELOG.md
  workflow_dispatch:
    inputs:
      bump_type:
        description: Version bump type
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch
      summary:
        description: Optional changelog summary. Leave blank to use branch commit subjects.
        required: false
        type: string

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Prepare release commit
        id: prepare
        env:
          BUMP_TYPE_INPUT: ${{ inputs.bump_type }}
          SUMMARY: ${{ inputs.summary || '' }}
        run: |
          set -euo pipefail

          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "This workflow is intended for a feature or release branch, not main."
            exit 1
          fi

          git fetch origin main --prune --tags

          bump_type="${BUMP_TYPE_INPUT:-}"
          if [ -z "$bump_type" ]; then
            latest_commit_message=$(git log -1 --format=%B)
            if printf '%s\n' "$latest_commit_message" | grep -q "#major"; then
              bump_type="major"
            elif printf '%s\n' "$latest_commit_message" | grep -q "#minor"; then
              bump_type="minor"
            else
              bump_type="patch"
            fi
          fi

          current_version=$(cat VERSION)
          major=$(echo "$current_version" | cut -d. -f1)
          minor=$(echo "$current_version" | cut -d. -f2)
          patch=$(echo "$current_version" | cut -d. -f3)

          case "$bump_type" in
            major)
              new_version="$((major + 1)).0.0"
              ;;
            minor)
              new_version="$major.$((minor + 1)).0"
              ;;
            patch)
              new_version="$major.$minor.$((patch + 1))"
              ;;
            *)
              echo "Unknown bump type: $bump_type"
              exit 1
              ;;
          esac

          release_date=$(date -u +"%Y-%m-%d")
          notes_source=$(mktemp)

          if [ -n "${SUMMARY}" ]; then
            printf '%s\n' "$SUMMARY" > "$notes_source"
          else
            base_commit=$(git merge-base HEAD origin/main)
            git log --format=%s --no-merges "${base_commit}..HEAD" > "$notes_source"
          fi

          changelog_entry=$(mktemp)
          {
            echo "## ${new_version} - ${release_date}"
            echo
            echo "### Changes"

            found_line=0
            while IFS= read -r line || [ -n "$line" ]; do
              trimmed=$(printf '%s' "$line" | sed -E 's/(^|[[:space:]])#(major|minor)\b//g' | sed -E 's/^[[:space:]]+|[[:space:]]+$//g')
              if [ -n "$trimmed" ]; then
                found_line=1
                case "$trimmed" in
                  -\ *|\*\ *)
                    trimmed="${trimmed#??}"
                    ;;
                esac
                echo "- $trimmed"
              fi
            done < "$notes_source"

            if [ "$found_line" -eq 0 ]; then
              echo "- Release ${new_version}"
            fi

            echo
          } > "$changelog_entry"

          if [ -f CHANGELOG.md ]; then
            {
              head -n 1 CHANGELOG.md
              echo
              cat "$changelog_entry"
              tail -n +2 CHANGELOG.md
            } > CHANGELOG.md.tmp
          else
            {
              echo "# Changelog"
              echo
              cat "$changelog_entry"
            } > CHANGELOG.md.tmp
          fi

          mv CHANGELOG.md.tmp CHANGELOG.md
          echo "$new_version" > VERSION

          rm -f "$notes_source" "$changelog_entry"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add VERSION CHANGELOG.md
          git commit -m "Prepare release v${new_version}"
          git push origin HEAD:"${GITHUB_REF_NAME}"

          echo "version=$new_version" >> "$GITHUB_OUTPUT"

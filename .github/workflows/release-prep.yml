name: Prepare Release Branch

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: Version bump type
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch
      summary:
        description: Optional changelog summary, one item per line.
        required: false
        type: string

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - name: Prepare release commit
        env:
          BUMP_TYPE_INPUT: ${{ inputs.bump_type }}
          SUMMARY: ${{ inputs.summary || '' }}
        id: prepare
        run: |
          set -euo pipefail

          git fetch origin main --prune --tags

          bump_type="${BUMP_TYPE_INPUT:-}"
          current_version=$(cat VERSION)
          major=$(echo "$current_version" | cut -d. -f1)
          minor=$(echo "$current_version" | cut -d. -f2)
          patch=$(echo "$current_version" | cut -d. -f3)

          case "$bump_type" in
            major)
              new_version="$((major + 1)).0.0"
              ;;
            minor)
              new_version="$major.$((minor + 1)).0"
              ;;
            patch)
              new_version="$major.$minor.$((patch + 1))"
              ;;
            *)
              echo "Unknown bump type: $bump_type"
              exit 1
              ;;
          esac

          branch="release/${new_version}"
          if git ls-remote --exit-code --heads origin "$branch" >/dev/null 2>&1; then
            echo "Branch ${branch} already exists."
            exit 1
          fi

          git switch -c "$branch" origin/main

          release_date=$(date -u +"%Y-%m-%d")
          if ! previous_tag=$(git describe --tags --abbrev=0 origin/main 2>/dev/null); then
            previous_tag="v${current_version}"
          fi

          notes_source=$(mktemp)
          if [ -n "${SUMMARY}" ]; then
            printf '%s\n' "$SUMMARY" > "$notes_source"
          else
            git log --format='%H%x1f%s' --no-merges "${previous_tag}..origin/main" | while IFS=$'\x1f' read -r commit subject; do
              [ -z "$commit" ] && continue

              case "$subject" in
                *"[skip ci]"*|Auto\ bump\ version*|Prepare\ release*|Release\ v*)
                  continue
                  ;;
              esac

              if git diff-tree --no-commit-id --name-only -r "$commit" | grep -qEv '^(\.github/workflows/|README\.md$|CHANGELOG\.md$|docs/)'; then
                printf '%s\n' "$subject"
              fi
            done > "$notes_source"
          fi

          changelog_entry=$(mktemp)
          {
            echo "## ${new_version} - ${release_date}"
            echo
            echo "### Changes"
            found_line=0
            while IFS= read -r line || [ -n "$line" ]; do
              line="$(printf '%s' "$line" | sed -E 's/^[[:space:]]+|[[:space:]]+$//g')"
              line="$(printf '%s' "$line" | sed -E 's/^[-*]+[[:space:]]+//')"
              if [ -n "$line" ]; then
                found_line=1
                echo "- $line"
              fi
            done < "$notes_source"

            if [ "$found_line" -eq 0 ]; then
              echo "- Release ${new_version}"
            fi
            echo
          } > "$changelog_entry"

          if [ -f CHANGELOG.md ]; then
            {
              head -n 1 CHANGELOG.md
              echo
              cat "$changelog_entry"
              tail -n +2 CHANGELOG.md
            } > CHANGELOG.md.tmp
          else
            {
              echo "# Changelog"
              echo
              cat "$changelog_entry"
            } > CHANGELOG.md.tmp
          fi

          mv CHANGELOG.md.tmp CHANGELOG.md
          echo "$new_version" > VERSION

          rm -f "$changelog_entry"
          rm -f "$notes_source"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add VERSION CHANGELOG.md
          git commit -m "Prepare release v${new_version}"
          git push -u origin "$branch"
          printf 'branch=%s\n' "$branch" >> "$GITHUB_OUTPUT"
          printf 'version=%s\n' "$new_version" >> "$GITHUB_OUTPUT"

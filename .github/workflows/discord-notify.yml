name: Notify Discord

on:
  workflow_run:
    workflows: ["Build and Push to GHCR"]
    types: [completed]
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Get version
        id: version
        run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Download release title artifact
        uses: actions/download-artifact@v8
        with:
          name: release-title
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Read release title
        id: commit
        run: |
          MSG=$(sed "s/'/\`/g" release_title.txt)
          echo "msg=${MSG}" >> "$GITHUB_OUTPUT"

      - name: Notify Discord — Success
        if: github.event.workflow_run.conclusion == 'success'
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ACTOR: ${{ github.event.workflow_run.triggering_actor.login }}
          BRANCH: ${{ github.event.workflow_run.head_branch }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          RUN_STARTED: ${{ github.event.workflow_run.run_started_at }}
          RUN_UPDATED: ${{ github.event.workflow_run.updated_at }}
          VERSION: ${{ steps.version.outputs.version }}
          COMMIT_MSG: ${{ steps.commit.outputs.msg }}
          REPO: ${{ github.repository }}
        run: |
          START="${RUN_STARTED}"
          END="${RUN_UPDATED}"
          DURATION=$(( $(date -d "$END" +%s) - $(date -d "$START" +%s) ))
          MINUTES=$(( DURATION / 60 ))
          SECONDS=$(( DURATION % 60 ))
          DURATION_STR="${MINUTES}m ${SECONDS}s"
          SHORT_SHA=$(echo "${HEAD_SHA}" | cut -c1-7)
          COMMIT_URL="https://github.com/${REPO}/commit/${HEAD_SHA}"
          SHA_FIELD="[${SHORT_SHA}](${COMMIT_URL})"
          payload=$(jq -n \
            --arg title "✅ Discord Cleanup Bot — Build Succeeded" \
            --arg color "3066993" \
            --arg timestamp "$RUN_UPDATED" \
            --arg footer "Discord Cleanup Bot v${VERSION} • github.com/antwanchild/discord_cleanup" \
            --arg version "$VERSION" \
            --arg actor "$ACTOR" \
            --arg branch "$BRANCH" \
            --arg commit "$COMMIT_MSG" \
            --arg duration "$DURATION_STR" \
            --arg run_url "https://github.com/${REPO}/actions/runs/${RUN_ID}" \
            --arg sha_field "$SHA_FIELD" \
            '{
              embeds: [{
                title: $title,
                color: ($color | tonumber),
                timestamp: $timestamp,
                footer: {text: $footer},
                fields: [
                  {name: "🏷️ Version", value: ("`" + $version + "`"), inline: true},
                  {name: "👤 Triggered by", value: ("`" + $actor + "`"), inline: true},
                  {name: "🌿 Branch", value: ("`" + $branch + "`"), inline: true},
                  {name: "💬 Commit", value: $commit, inline: false},
                  {name: "⏱️ Duration", value: ("`" + $duration + "`"), inline: true},
                  {name: "🔗 Run", value: ("[View run](" + $run_url + ")"), inline: true},
                  {name: "SHA", value: $sha_field, inline: true}
                ]
              }]
            }')
          curl -H "Content-Type: application/json" \
            --data-binary "$payload" \
            "$DISCORD_WEBHOOK"

      - name: Notify Discord — Failure
        if: github.event.workflow_run.conclusion == 'failure'
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ACTOR: ${{ github.event.workflow_run.triggering_actor.login }}
          BRANCH: ${{ github.event.workflow_run.head_branch }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          RUN_STARTED: ${{ github.event.workflow_run.run_started_at }}
          RUN_UPDATED: ${{ github.event.workflow_run.updated_at }}
          VERSION: ${{ steps.version.outputs.version }}
          COMMIT_MSG: ${{ steps.commit.outputs.msg }}
          REPO: ${{ github.repository }}
        run: |
          START="${RUN_STARTED}"
          END="${RUN_UPDATED}"
          DURATION=$(( $(date -d "$END" +%s) - $(date -d "$START" +%s) ))
          MINUTES=$(( DURATION / 60 ))
          SECONDS=$(( DURATION % 60 ))
          DURATION_STR="${MINUTES}m ${SECONDS}s"
          SHORT_SHA=$(echo "${HEAD_SHA}" | cut -c1-7)
          COMMIT_URL="https://github.com/${REPO}/commit/${HEAD_SHA}"
          SHA_FIELD="[${SHORT_SHA}](${COMMIT_URL})"
          payload=$(jq -n \
            --arg title "❌ Discord Cleanup Bot — Build Failed" \
            --arg color "15158332" \
            --arg timestamp "$RUN_UPDATED" \
            --arg footer "Discord Cleanup Bot v${VERSION} • github.com/antwanchild/discord_cleanup" \
            --arg version "$VERSION" \
            --arg actor "$ACTOR" \
            --arg branch "$BRANCH" \
            --arg commit "$COMMIT_MSG" \
            --arg duration "$DURATION_STR" \
            --arg logs_url "https://github.com/${REPO}/actions/runs/${RUN_ID}" \
            --arg sha_field "$SHA_FIELD" \
            '{
              embeds: [{
                title: $title,
                color: ($color | tonumber),
                timestamp: $timestamp,
                footer: {text: $footer},
                fields: [
                  {name: "🏷️ Version", value: ("`" + $version + "`"), inline: true},
                  {name: "👤 Triggered by", value: ("`" + $actor + "`"), inline: true},
                  {name: "🌿 Branch", value: ("`" + $branch + "`"), inline: true},
                  {name: "💬 Commit", value: $commit, inline: false},
                  {name: "⏱️ Duration", value: ("`" + $duration + "`"), inline: true},
                  {name: "🔗 Logs", value: ("[View logs](" + $logs_url + ")"), inline: true},
                  {name: "SHA", value: $sha_field, inline: true}
                ]
              }]
            }')
          curl -H "Content-Type: application/json" \
            --data-binary "$payload" \
            "$DISCORD_WEBHOOK"

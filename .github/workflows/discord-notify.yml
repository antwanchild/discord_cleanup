name: Notify Discord

on:
  workflow_run:
    workflows: ["Build and Push to GHCR"]
    types: [completed]
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Get version
        id: version
        run: echo "version=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Get commit message
        id: commit
        run: |
          MSG=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/commits/${{ github.event.workflow_run.head_sha }}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['commit']['message'])")
          echo "msg<<EOF" >> $GITHUB_OUTPUT
          echo "$MSG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Notify Discord — Success
        if: github.event.workflow_run.conclusion == 'success'
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          START="${{ github.event.workflow_run.run_started_at }}"
          END="${{ github.event.workflow_run.updated_at }}"
          DURATION=$(( $(date -d "$END" +%s) - $(date -d "$START" +%s) ))
          MINUTES=$(( DURATION / 60 ))
          SECONDS=$(( DURATION % 60 ))
          DURATION_STR="${MINUTES}m ${SECONDS}s"
          SHORT_SHA=$(echo "${{ github.event.workflow_run.head_sha }}" | cut -c1-7)
          COMMIT_URL="https://github.com/${{ github.repository }}/commit/${{ github.event.workflow_run.head_sha }}"
          SHA_FIELD="[${SHORT_SHA}](${COMMIT_URL})"

          COMMIT_MSG=$(base64 -d < <(base64 commit_msg.txt))
          curl -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"✅ Discord Cleanup Bot — Build Succeeded\",
                \"color\": 3066993,
                \"timestamp\": \"${{ github.event.workflow_run.updated_at }}\",
                \"footer\": {\"text\": \"Discord Cleanup Bot v${{ steps.version.outputs.version }} • github.com/antwanchild/discord_cleanup\"},
                \"fields\": [
                  {\"name\": \"🏷️ Version\", \"value\": \"\`${{ steps.version.outputs.version }}\`\", \"inline\": true},
                  {\"name\": \"👤 Triggered by\", \"value\": \"\`${{ github.event.workflow_run.triggering_actor.login }}\`\", \"inline\": true},
                  {\"name\": \"🌿 Branch\", \"value\": \"\`${{ github.event.workflow_run.head_branch }}\`\", \"inline\": true},
                  {\"name\": \"💬 Commit\", \"value\": \"\`${{ steps.commit.outputs.msg }}\`\", \"inline\": false},
                  {\"name\": \"⏱️ Duration\", \"value\": \"\`${DURATION_STR}\`\", \"inline\": true},
                  {\"name\": \"🔗 Run\", \"value\": \"[View run](https://github.com/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }})\", \"inline\": true},
                  {\"name\": \"SHA\", \"value\": \"${SHA_FIELD}\", \"inline\": true}
                ]
              }]
            }" \
            $DISCORD_WEBHOOK


      - name: Notify Discord — Failure
        if: github.event.workflow_run.conclusion == 'failure'
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          START="${{ github.event.workflow_run.run_started_at }}"
          END="${{ github.event.workflow_run.updated_at }}"
          DURATION=$(( $(date -d "$END" +%s) - $(date -d "$START" +%s) ))
          MINUTES=$(( DURATION / 60 ))
          SECONDS=$(( DURATION % 60 ))
          DURATION_STR="${MINUTES}m ${SECONDS}s"
          SHORT_SHA=$(echo "${{ github.event.workflow_run.head_sha }}" | cut -c1-7)
          COMMIT_URL="https://github.com/${{ github.repository }}/commit/${{ github.event.workflow_run.head_sha }}"
          SHA_FIELD="[${SHORT_SHA}](${COMMIT_URL})"

          curl -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"❌ Discord Cleanup Bot — Build Failed\",
                \"color\": 15158332,
                \"timestamp\": \"${{ github.event.workflow_run.updated_at }}\",
                \"footer\": {\"text\": \"Discord Cleanup Bot v${{ steps.version.outputs.version }} • github.com/antwanchild/discord_cleanup\"},
                \"fields\": [
                  {\"name\": \"🏷️ Version\", \"value\": \"\`${{ steps.version.outputs.version }}\`\", \"inline\": true},
                  {\"name\": \"👤 Triggered by\", \"value\": \"\`${{ github.event.workflow_run.triggering_actor.login }}\`\", \"inline\": true},
                  {\"name\": \"🌿 Branch\", \"value\": \"\`${{ github.event.workflow_run.head_branch }}\`\", \"inline\": true},
                  {\"name\": \"💬 Commit\", \"value\": \"\`${{ steps.commit.outputs.msg }}\`\", \"inline\": false},
                  {\"name\": \"⏱️ Duration\", \"value\": \"\`${DURATION_STR}\`\", \"inline\": true},
                  {\"name\": \"🔗 Logs\", \"value\": \"[View logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }})\", \"inline\": true},
                  {\"name\": \"SHA\", \"value\": \"${SHA_FIELD}\", \"inline\": true}
                ]
              }]
            }" \
            $DISCORD_WEBHOOK

name: Notify Discord on GitHub Activity

on:
  watch:
    types: [started]
  fork:
  issues:
    types: [opened]
  issue_comment:
    types: [created]
  workflow_dispatch:

jobs:
  notify-star:
    if: github.event_name == 'watch'
    runs-on: ubuntu-latest
    steps:
      - name: Notify Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ACTOR: ${{ github.actor }}
        run: |
          payload=$(jq -n \
            --arg title "⭐ New Star" \
            --arg color "16766720" \
            --arg timestamp "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg footer "Discord Cleanup Bot • github.com/antwanchild/discord_cleanup" \
            --arg actor "$ACTOR" \
            '{
              embeds: [{
                title: $title,
                color: ($color | tonumber),
                timestamp: $timestamp,
                footer: {text: $footer},
                fields: [
                  {name: "👤 User", value: ("`" + $actor + "`"), inline: true},
                  {name: "🔗 Profile", value: ("[View profile](https://github.com/" + $actor + ")"), inline: true}
                ]
              }]
            }')
          curl -H "Content-Type: application/json" \
            --data-binary "$payload" \
            "$DISCORD_WEBHOOK"

  notify-fork:
    if: github.event_name == 'fork'
    runs-on: ubuntu-latest
    steps:
      - name: Notify Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ACTOR: ${{ github.actor }}
          FORK_NAME: ${{ github.event.forkee.full_name }}
        run: |
          payload=$(jq -n \
            --arg title "🍴 New Fork" \
            --arg color "3447003" \
            --arg timestamp "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg footer "Discord Cleanup Bot • github.com/antwanchild/discord_cleanup" \
            --arg actor "$ACTOR" \
            --arg fork_name "$FORK_NAME" \
            '{
              embeds: [{
                title: $title,
                color: ($color | tonumber),
                timestamp: $timestamp,
                footer: {text: $footer},
                fields: [
                  {name: "👤 User", value: ("`" + $actor + "`"), inline: true},
                  {name: "🔗 Fork", value: ("[View fork](https://github.com/" + $fork_name + ")"), inline: true}
                ]
              }]
            }')
          curl -H "Content-Type: application/json" \
            --data-binary "$payload" \
            "$DISCORD_WEBHOOK"

  notify-issue-opened:
    if: github.event_name == 'issues' && github.event.action == 'opened'
    runs-on: ubuntu-latest
    steps:
      - name: Notify Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ACTOR: ${{ github.actor }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          payload=$(jq -n \
            --arg title "🐛 New Issue Opened" \
            --arg color "15158332" \
            --arg timestamp "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg footer "Discord Cleanup Bot • github.com/antwanchild/discord_cleanup" \
            --arg issue_title "$ISSUE_TITLE" \
            --arg actor "$ACTOR" \
            --arg issue_number "$ISSUE_NUMBER" \
            --arg repo "$REPO" \
            '{
              embeds: [{
                title: $title,
                color: ($color | tonumber),
                timestamp: $timestamp,
                footer: {text: $footer},
                fields: [
                  {name: "📋 Title", value: $issue_title, inline: false},
                  {name: "👤 Opened by", value: ("`" + $actor + "`"), inline: true},
                  {name: "🔗 Issue", value: ("[View issue](https://github.com/" + $repo + "/issues/" + $issue_number + ")"), inline: true}
                ]
              }]
            }')
          curl -H "Content-Type: application/json" \
            --data-binary "$payload" \
            "$DISCORD_WEBHOOK"

  notify-issue-commented:
    if: github.event_name == 'issue_comment' && github.event.action == 'created'
    runs-on: ubuntu-latest
    steps:
      - name: Notify Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ACTOR: ${{ github.actor }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          payload=$(jq -n \
            --arg title "💬 New Issue Comment" \
            --arg color "9807270" \
            --arg timestamp "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg footer "Discord Cleanup Bot • github.com/antwanchild/discord_cleanup" \
            --arg issue_title "$ISSUE_TITLE" \
            --arg actor "$ACTOR" \
            --arg issue_number "$ISSUE_NUMBER" \
            --arg repo "$REPO" \
            '{
              embeds: [{
                title: $title,
                color: ($color | tonumber),
                timestamp: $timestamp,
                footer: {text: $footer},
                fields: [
                  {name: "📋 Issue", value: $issue_title, inline: false},
                  {name: "👤 Commented by", value: ("`" + $actor + "`"), inline: true},
                  {name: "🔗 Comment", value: ("[View comment](https://github.com/" + $repo + "/issues/" + $issue_number + ")"), inline: true}
                ]
              }]
            }')
          curl -H "Content-Type: application/json" \
            --data-binary "$payload" \
            "$DISCORD_WEBHOOK"

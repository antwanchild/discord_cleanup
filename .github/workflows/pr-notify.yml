name: Notify Discord on PR

on:
  pull_request:
    types: [opened, reopened, closed]
  workflow_dispatch:

jobs:
  notify-opened:
    if: github.event.pull_request.user.login != 'dependabot[bot]' && github.event.action == 'opened'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - name: Notify Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.actor }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          payload=$(jq -n \
            --arg title "🔔 PR Opened" \
            --arg color "3447003" \
            --arg timestamp "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg footer "Discord Cleanup Bot • github.com/antwanchild/discord_cleanup" \
            --arg pr_title "$PR_TITLE" \
            --arg pr_author "$PR_AUTHOR" \
            --arg pr_branch "$PR_BRANCH" \
            --arg pr_number "$PR_NUMBER" \
            --arg repo "$REPO" \
            '{
              embeds: [{
                title: $title,
                color: ($color | tonumber),
                timestamp: $timestamp,
                footer: {text: $footer},
                fields: [
                  {name: "📋 Title", value: $pr_title, inline: false},
                  {name: "👤 Author", value: ("`" + $pr_author + "`"), inline: true},
                  {name: "🌿 Branch", value: ("`" + $pr_branch + "`"), inline: true},
                  {name: "🔗 PR", value: ("[View PR](https://github.com/" + $repo + "/pull/" + $pr_number + ")"), inline: true}
                ]
              }]
            }')
          curl -H "Content-Type: application/json" \
            --data-binary "$payload" \
            "$DISCORD_WEBHOOK"

  notify-reopened:
    if: github.event.pull_request.user.login != 'dependabot[bot]' && github.event.action == 'reopened'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - name: Notify Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.actor }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          payload=$(jq -n \
            --arg title "🔄 PR Reopened" \
            --arg color "16753920" \
            --arg timestamp "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg footer "Discord Cleanup Bot • github.com/antwanchild/discord_cleanup" \
            --arg pr_title "$PR_TITLE" \
            --arg pr_author "$PR_AUTHOR" \
            --arg pr_branch "$PR_BRANCH" \
            --arg pr_number "$PR_NUMBER" \
            --arg repo "$REPO" \
            '{
              embeds: [{
                title: $title,
                color: ($color | tonumber),
                timestamp: $timestamp,
                footer: {text: $footer},
                fields: [
                  {name: "📋 Title", value: $pr_title, inline: false},
                  {name: "👤 Author", value: ("`" + $pr_author + "`"), inline: true},
                  {name: "🌿 Branch", value: ("`" + $pr_branch + "`"), inline: true},
                  {name: "🔗 PR", value: ("[View PR](https://github.com/" + $repo + "/pull/" + $pr_number + ")"), inline: true}
                ]
              }]
            }')
          curl -H "Content-Type: application/json" \
            --data-binary "$payload" \
            "$DISCORD_WEBHOOK"

  notify-merged:
    if: github.event.pull_request.user.login != 'dependabot[bot]' && github.event.action == 'closed' && github.event.pull_request.merge_commit_sha != null
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - name: Notify Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.actor }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          payload=$(jq -n \
            --arg title "✅ PR Merged" \
            --arg color "3066993" \
            --arg timestamp "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg footer "Discord Cleanup Bot • github.com/antwanchild/discord_cleanup" \
            --arg pr_title "$PR_TITLE" \
            --arg pr_author "$PR_AUTHOR" \
            --arg pr_branch "$PR_BRANCH" \
            --arg pr_number "$PR_NUMBER" \
            --arg repo "$REPO" \
            '{
              embeds: [{
                title: $title,
                color: ($color | tonumber),
                timestamp: $timestamp,
                footer: {text: $footer},
                fields: [
                  {name: "📋 Title", value: $pr_title, inline: false},
                  {name: "👤 Author", value: ("`" + $pr_author + "`"), inline: true},
                  {name: "🌿 Branch", value: ("`" + $pr_branch + "`"), inline: true},
                  {name: "🔗 PR", value: ("[View PR](https://github.com/" + $repo + "/pull/" + $pr_number + ")"), inline: true}
                ]
              }]
            }')
          curl -H "Content-Type: application/json" \
            --data-binary "$payload" \
            "$DISCORD_WEBHOOK"

  notify-closed:
    if: github.event.pull_request.user.login != 'dependabot[bot]' && github.event.action == 'closed' && github.event.pull_request.merge_commit_sha == null
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - name: Notify Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.actor }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          payload=$(jq -n \
            --arg title "🚫 PR Closed Without Merging" \
            --arg color "15158332" \
            --arg timestamp "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg footer "Discord Cleanup Bot • github.com/antwanchild/discord_cleanup" \
            --arg pr_title "$PR_TITLE" \
            --arg pr_author "$PR_AUTHOR" \
            --arg pr_branch "$PR_BRANCH" \
            --arg pr_number "$PR_NUMBER" \
            --arg repo "$REPO" \
            '{
              embeds: [{
                title: $title,
                color: ($color | tonumber),
                timestamp: $timestamp,
                footer: {text: $footer},
                fields: [
                  {name: "📋 Title", value: $pr_title, inline: false},
                  {name: "👤 Author", value: ("`" + $pr_author + "`"), inline: true},
                  {name: "🌿 Branch", value: ("`" + $pr_branch + "`"), inline: true},
                  {name: "🔗 PR", value: ("[View PR](https://github.com/" + $repo + "/pull/" + $pr_number + ")"), inline: true}
                ]
              }]
            }')
          curl -H "Content-Type: application/json" \
            --data-binary "$payload" \
            "$DISCORD_WEBHOOK"

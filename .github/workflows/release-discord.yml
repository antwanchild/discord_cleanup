name: Release to Discord

# Fires when a GitHub Release is published.
# Only triggers on minor and major releases since patch builds
# do not create a GitHub Release in the docker-publish workflow.

on:
  release:
    types:
      - published

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v6

      # ── Notify ──────────────────────────────────────────────────────────────
      # Posts the full GitHub Release notes to Discord as a formatted embed.
      # Complements notify-discord.yml which fires on every push with build info.
      - name: Post release to Discord
        uses: SethCohen/github-releases-to-discord@v1
        with:
          webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          color: "7419530"
          username: "Discord Cleanup Bot"
          footer_title: "Changelog"
          reduce_headings: true

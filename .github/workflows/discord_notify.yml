name: Notify Discord

on:
  workflow_run:
    workflows: ["Build and Push to GHCR"]
    types: [completed]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Get version
        id: version
        run: echo "version=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Notify Discord (Success)
        if: ${{ github.event.workflow_run.conclusion == 'success' }}
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          START="${{ github.event.workflow_run.run_started_at }}"
          END="${{ github.event.workflow_run.updated_at }}"
          DURATION=$(( $(date -d "$END" +%s) - $(date -d "$START" +%s) ))
          MINUTES=$(( DURATION / 60 ))
          SECONDS=$(( DURATION % 60 ))
          DURATION_STR="${MINUTES}m ${SECONDS}s"

          curl -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"✅ Discord Cleanup Bot — Build Succeeded\",
                \"color\": 3066993,
                \"fields\": [
                  {\"name\": \"🏷️ Version\", \"value\": \"\`${{ steps.version.outputs.version }}\`\", \"inline\": true},
                  {\"name\": \"👤 Triggered by\", \"value\": \"\`${{ github.event.workflow_run.triggering_actor.login }}\`\", \"inline\": true},
                  {\"name\": \"🌿 Branch\", \"value\": \"\`${{ github.event.workflow_run.head_branch }}\`\", \"inline\": true},
                  {\"name\": \"💬 Commit\", \"value\": \"\`${{ github.event.workflow_run.head_commit.message }}\`\", \"inline\": false},
                  {\"name\": \"⏱️ Duration\", \"value\": \"\`${DURATION_STR}\`\", \"inline\": true},
                  {\"name\": \"🔗 Run\", \"value\": \"[View run](https://github.com/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }})\", \"inline\": true}
                ]
              }]
            }" \
            $DISCORD_WEBHOOK

      - name: Notify Discord (Failure)
        if: ${{ github.event.workflow_run.conclusion == 'failure' }}
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          START="${{ github.event.workflow_run.run_started_at }}"
          END="${{ github.event.workflow_run.updated_at }}"
          DURATION=$(( $(date -d "$END" +%s) - $(date -d "$START" +%s) ))
          MINUTES=$(( DURATION / 60 ))
          SECONDS=$(( DURATION % 60 ))
          DURATION_STR="${MINUTES}m ${SECONDS}s"

          curl -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"❌ Discord Cleanup Bot — Build Failed\",
                \"color\": 15158332,
                \"fields\": [
                  {\"name\": \"🏷️ Version\", \"value\": \"\`${{ steps.version.outputs.version }}\`\", \"inline\": true},
                  {\"name\": \"👤 Triggered by\", \"value\": \"\`${{ github.event.workflow_run.triggering_actor.login }}\`\", \"inline\": true},
                  {\"name\": \"🌿 Branch\", \"value\": \"\`${{ github.event.workflow_run.head_branch }}\`\", \"inline\": true},
                  {\"name\": \"💬 Commit\", \"value\": \"\`${{ github.event.workflow_run.head_commit.message }}\`\", \"inline\": false},
                  {\"name\": \"⏱️ Duration\", \"value\": \"\`${DURATION_STR}\`\", \"inline\": true},
                  {\"name\": \"🔗 Logs\", \"value\": \"[View logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }})\", \"inline\": true}
                ]
              }]
            }" \
            $DISCORD_WEBHOOK

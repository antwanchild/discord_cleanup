name: Notify Discord on Dependabot PR

on:
  pull_request_target:
    types: [opened, closed]
  workflow_dispatch:

jobs:
  notify-opened:
    if: github.actor == 'dependabot[bot]' && github.event.action == 'opened'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - name: Notify Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          payload=$(jq -n \
            --arg title "🔔 Dependabot PR Opened" \
            --arg color "16753920" \
            --arg timestamp "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg footer "Discord Cleanup Bot • github.com/antwanchild/discord_cleanup" \
            --arg pr_title "$PR_TITLE" \
            --arg pr_number "$PR_NUMBER" \
            --arg repo "$REPO" \
            '{
              embeds: [{
                title: $title,
                color: ($color | tonumber),
                timestamp: $timestamp,
                footer: {text: $footer},
                fields: [
                  {name: "📦 Update", value: $pr_title, inline: false},
                  {name: "🔗 PR", value: ("[View PR](https://github.com/" + $repo + "/pull/" + $pr_number + ")"), inline: true}
                ]
              }]
            }')
          curl -H "Content-Type: application/json" \
            --data-binary "$payload" \
            "$DISCORD_WEBHOOK"

  notify-merged:
    if: github.event.action == 'closed' && github.event.pull_request.merge_commit_sha != null && contains(github.event.pull_request.labels.*.name, 'dependencies')
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - name: Notify Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          payload=$(jq -n \
            --arg title "✅ Dependabot PR Merged" \
            --arg color "3066993" \
            --arg timestamp "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg footer "Discord Cleanup Bot • github.com/antwanchild/discord_cleanup" \
            --arg pr_title "$PR_TITLE" \
            --arg pr_number "$PR_NUMBER" \
            --arg repo "$REPO" \
            '{
              embeds: [{
                title: $title,
                color: ($color | tonumber),
                timestamp: $timestamp,
                footer: {text: $footer},
                fields: [
                  {name: "📦 Update", value: $pr_title, inline: false},
                  {name: "🔗 PR", value: ("[View PR](https://github.com/" + $repo + "/pull/" + $pr_number + ")"), inline: true}
                ]
              }]
            }')
          curl -H "Content-Type: application/json" \
            --data-binary "$payload" \
            "$DISCORD_WEBHOOK"

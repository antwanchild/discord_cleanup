name: Notify Discord on Dependabot PR

on:
  pull_request_target:
    types: [opened, closed, reopened]

jobs:
  notify-opened:
    if: github.actor == 'dependabot[bot]' && github.event.action == 'opened'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - name: Notify Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"🔔 Dependabot PR Opened\",
                \"color\": 16753920,
                \"fields\": [
                  {\"name\": \"📦 Update\", \"value\": \"${{ github.event.pull_request.title }}\", \"inline\": false},
                  {\"name\": \"🔗 PR\", \"value\": \"[View PR](https://github.com/${{ github.repository }}/pull/${{ github.event.pull_request.number }})\", \"inline\": true}
                ]
              }]
            }" \
            $DISCORD_WEBHOOK

  notify-reopened:
    if: github.actor == 'dependabot[bot]' && github.event.action == 'reopened'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - name: Notify Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"🔄 Dependabot PR Reopened\",
                \"color\": 3447003,
                \"fields\": [
                  {\"name\": \"📦 Update\", \"value\": \"${{ github.event.pull_request.title }}\", \"inline\": false},
                  {\"name\": \"🔗 PR\", \"value\": \"[View PR](https://github.com/${{ github.repository }}/pull/${{ github.event.pull_request.number }})\", \"inline\": true}
                ]
              }]
            }" \
            $DISCORD_WEBHOOK

  notify-merged:
    if: github.actor == 'dependabot[bot]' && github.event.action == 'closed' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - name: Notify Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"✅ Dependabot PR Merged\",
                \"color\": 3066993,
                \"fields\": [
                  {\"name\": \"📦 Update\", \"value\": \"${{ github.event.pull_request.title }}\", \"inline\": false},
                  {\"name\": \"🔗 PR\", \"value\": \"[View PR](https://github.com/${{ github.repository }}/pull/${{ github.event.pull_request.number }})\", \"inline\": true}
                ]
              }]
            }" \
            $DISCORD_WEBHOOK

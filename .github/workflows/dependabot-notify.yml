name: Notify Discord on Dependabot PR

on:
  pull_request:
    types: [opened]

jobs:
  notify:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Notify Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"🔔 Dependabot PR Opened\",
                \"description\": \"**${{ github.event.pull_request.title }}**\n**[View PR](https://github.com/${{ github.repository }}/pull/${{ github.event.pull_request.number }})\"\,
                \"color\": 16753920
              }]
            }" \
            $DISCORD_WEBHOOK
